<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tentang Anime</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        /* Efek Background Karakter (Ganti URL dengan link Conan kamu) */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://i.ibb.co.com/21F5xnKN/20260324-062449.png');
            background-size: cover;
            background-position: center;
            opacity: 0.50; /* Atur kepekatan gambar latar */
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 1;
        }
        .logo { 
            width: 140px; 
            margin-bottom: 10px;
        }
        h1 {
  color: #a80000;
  text-transform: uppercase;
  margin-bottom: 30px;
  font-weight: 900;
  letter-spacing: 1px;
  /* Tambahan Garis Tepi Putih di Bawah Ini */
  text-shadow: 
    -2px -2px 0 #fff,  
     2px -2px 0 #fff,
    -2px  2px 0 #fff,
     2px  2px 0 #fff;
        }
        .btn {
            display: block;
            background-color: #a00000;
            color: white !important;
            text-decoration: none;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="content">
            <img src="https://i.ibb.co.com/fdzr5wrL/20260324-062628.png" alt="Logo" class="logo">
            
            <h1>Tentang Anime</h1>

            <a href="https://drive.google.com/file/d/1YfpLQGZJa-yEreJlw7QihQTuXQyZ-zgA/view?usp=drivesdk" target="_blank" rel="noopener noreferrer" class="btn">Download APK</a>
            <a href="https://drive.google.com/file/d/1YfpLQGZJa-yEreJlw7QihQTuXQyZ-zgA/view?usp=drivesdk" target="_blank" rel="noopener noreferrer" class="btn">Cara Install APK</a>
            <a href="https://drive.google.com/file/d/1YfpLQGZJa-yEreJlw7QihQTuXQyZ-zgA/view?usp=drivesdk" target="_blank" rel="noopener noreferrer" class="btn">Request Anime</a>
            <a href="https://drive.google.com/file/d/1YfpLQGZJa-yEreJlw7QihQTuXQyZ-zgA/view?usp=drivesdk" target="_blank" rel="noopener noreferrer" class="btn">Lapor Link Error</a>
        </div>
    </div>

</body>
</html>
